<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Parachute Law</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#0a0a0a] min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm mx-auto px-6">
        <div class="text-center mb-8">
            <h1 class="font-serif text-3xl text-white mb-2">Parachute Law</h1>
            <p class="text-gray-500 text-sm">Enter the password to continue</p>
        </div>
        <form method="POST" class="space-y-4">
            {% if error %}
            <div class="bg-red-900/30 border border-red-800 text-red-300 text-sm rounded-lg px-4 py-3">
                {{ error }}
            </div>
            {% endif %}
            <input
                type="password"
                name="password"
                placeholder="Password"
                autofocus
                required
                class="w-full px-4 py-3 bg-[#1a1a1a] border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#C4A470] transition"
            >
            <button
                type="submit"
                class="w-full py-3 bg-[#C4A470] hover:bg-[#b8956a] text-white font-medium rounded-lg transition"
            >
                Enter
            </button>
        </form>
    </div>
</body>
</html>
